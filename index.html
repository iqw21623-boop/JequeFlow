
<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JegueFlow FINAL</title>

<style>
body{
margin:0;
font-family:Arial,sans-serif;
background:#f3f1eb;
}

.topbar{
display:flex;
justify-content:space-between;
align-items:center;
padding:18px;
background:white;
position:sticky;
top:0;
}

.logo{
font-size:28px;
font-weight:bold;
}

.search{
width:45%;
padding:12px;
border:none;
border-radius:999px;
background:#eee;
}

.gear{
font-size:28px;
cursor:pointer;
}

.sidebar{
position:fixed;
top:0;
right:-320px;
width:300px;
height:100%;
background:white;
padding:20px;
transition:0.3s;
box-shadow:-10px 0 20px rgba(0,0,0,0.1);
}

.sidebar.open{
right:0;
}

.sidebar button{
width:100%;
padding:14px;
margin-bottom:10px;
border:none;
border-radius:14px;
cursor:pointer;
}

.workspace{
max-width:900px;
margin:auto;
padding:25px;
}

.block{
background:white;
padding:20px;
border-radius:20px;
margin-bottom:18px;
}

textarea{
width:100%;
min-height:160px;
border:none;
outline:none;
font-size:18px;
line-height:2;
resize:vertical;
}

.code{
background:#111;
color:#58a6ff;
padding:16px;
border-radius:14px;
font-family:monospace;
white-space:pre-wrap;
outline:none;
min-height:120px;
}

.ai{
position:fixed;
right:20px;
bottom:20px;
padding:16px;
border:none;
border-radius:999px;
cursor:pointer;
}
</style>
</head>

<body>

<div class="topbar">

<div class="logo">
🐴 JegueFlow
</div>

<input class="search" id="searchInput" placeholder="Pesquisar...">

<div class="gear" onclick="toggleSidebar()">
⚙️
</div>

</div>

<div class="sidebar" id="sidebar">

<button onclick="addText()">
✏️ Texto
</button>

<button onclick="addCode()">
💻 Código
</button>

</div>

<div class="workspace" id="workspace"></div>

<button class="ai" onclick="copyMarkdown()">
💬 IA
</button>

<script>

const workspace = document.getElementById("workspace");
const sidebar = document.getElementById("sidebar");

function toggleSidebar(){
sidebar.classList.toggle("open");
}

document.addEventListener("click", function(e){

const gear = document.querySelector(".gear");

if(
sidebar.classList.contains("open") &&
!sidebar.contains(e.target) &&
!gear.contains(e.target)
){
sidebar.classList.remove("open");
}

});

function addText(){

const block = document.createElement("div");
block.className = "block";

const textarea = document.createElement("textarea");

textarea.placeholder = "Escreva aqui...";

block.appendChild(textarea);

workspace.appendChild(block);

save();

}

function addCode(){

const block = document.createElement("div");
block.className = "block";

const code = document.createElement("div");

code.className = "code";
code.contentEditable = true;

code.innerText =
"function exemplo(){\n   console.log('JegueFlow');\n}";

block.appendChild(code);

workspace.appendChild(block);

save();

}

function save(){
localStorage.setItem("jegueflow", workspace.innerHTML);
}

function load(){

const saved = localStorage.getItem("jegueflow");

if(saved){
workspace.innerHTML = saved;
}else{
addText();
}

}

document.getElementById("searchInput").addEventListener("keydown", function(e){

if(e.key === "Enter"){

const query =
this.value.toLowerCase();

const blocks =
document.querySelectorAll("textarea,.code");

for(let block of blocks){

const text =
block.value || block.innerText;

if(text.toLowerCase().includes(query)){

block.scrollIntoView({
behavior:"smooth",
block:"center"
});

block.style.background =
"#fff5a8";

setTimeout(()=>{
block.style.background = "";
},2000);

break;

}

}

}

});

function copyMarkdown(){

let markdown = "";

document.querySelectorAll(".block").forEach(block=>{

const textarea =
block.querySelector("textarea");

const code =
block.querySelector(".code");

if(textarea){
markdown += textarea.value + "\n\n";
}

if(code){

markdown +=
"```javascript\n" +
code.innerText +
"\n```\n\n";

}

});

navigator.clipboard.writeText(markdown);

alert("📋 Copiado para IA!");

}

load();

</script>

</body>
</html>
