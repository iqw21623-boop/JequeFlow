
<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JegueFlow Ultimate</title>
<style>
body{
font-family:Arial,sans-serif;
background:#f3f1eb;
padding:30px;
}
textarea{
width:100%;
height:400px;
font-size:18px;
line-height:1.8;
}
.code{
background:#111;
color:#58a6ff;
padding:16px;
border-radius:12px;
font-family:monospace;
margin-top:20px;
white-space:pre-wrap;
}
.ai{
position:fixed;
bottom:20px;
right:20px;
padding:16px;
border:none;
border-radius:999px;
cursor:pointer;
}
</style>
</head>
<body>

<h1>🐴 JegueFlow Ultimate</h1>

<textarea placeholder="Escreva suas anotações aqui..."></textarea>

<div class="code" contenteditable="true">
// Seu código aqui
function estudar(){
   console.log("JegueFlow");
}
</div>

<button class="ai" onclick="copiarMarkdown()">
💬 IA
</button>

<script>

function copiarMarkdown(){

const texto = document.querySelector("textarea").value;
const codigo = document.querySelector(".code").innerText;

const markdown =
texto +
"\n\n```javascript\n" +
codigo +
"\n```";

navigator.clipboard.writeText(markdown);

alert("📋 Conteúdo copiado para enviar à IA!");

}

</script>

</body>
</html>
