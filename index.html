<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JegueFlow</title>
<link rel="manifest" href="manifest.json">
<style>
body{
margin:0;
font-family:Arial,sans-serif;
background:#f3f1eb;
color:#222;
transition:0.3s;
}
.dark{
background:#12161c;
color:white;
}
.container{
max-width:900px;
margin:auto;
padding:30px;
}
.header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:20px;
}
.title{
font-size:32px;
font-weight:bold;
}
button{
padding:10px 18px;
border:none;
border-radius:999px;
background:#222;
color:white;
cursor:pointer;
}
.note-area{
background:white;
border-radius:20px;
padding:25px;
box-shadow:0 10px 30px rgba(0,0,0,0.08);
}
.dark .note-area{
background:#1e242d;
}
textarea{
width:100%;
height:70vh;
border:none;
outline:none;
resize:none;
font-size:18px;
line-height:2;
background:transparent;
background-image:
linear-gradient(to bottom,
transparent 95%,
rgba(0,0,0,0.08) 95%);
background-size:100% 36px;
color:inherit;
font-family:inherit;
}
.footer{
margin-top:20px;
opacity:0.6;
font-size:14px;
text-align:center;
}
</style>
</head>
<body>

<div class="container">

<div class="header">
<div class="title">🐴 JegueFlow</div>

<button onclick="toggleTheme()">
Alternar Tema
</button>
</div>

<div class="note-area">
<textarea id="notes" placeholder="Escreva livremente..."></textarea>
</div>

<div class="footer">
Sistema inteligente de escrita criativa
</div>

</div>

<script>
function toggleTheme(){
document.body.classList.toggle('dark');
}

const notes = document.getElementById("notes");

notes.value = localStorage.getItem("jegueflow-notes") || "";

notes.addEventListener("input", () => {
localStorage.setItem("jegueflow-notes", notes.value);
});

if ('serviceWorker' in navigator) {
window.addEventListener('load', () => {
navigator.serviceWorker.register('service-worker.js');
});
}
</script>

</body>
</html>
