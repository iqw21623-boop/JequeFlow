<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JegueFlow</title>
<link rel="manifest" href="manifest.json">

<style>

*{
box-sizing:border-box;
}

body{
margin:0;
font-family:Arial,sans-serif;
background:#f3f1eb;
color:#222;
transition:0.3s;
}

.dark{
background:#12161c;
color:white;
}

.topbar{
display:flex;
align-items:center;
justify-content:space-between;
padding:18px 24px;
position:sticky;
top:0;
backdrop-filter:blur(10px);
background:rgba(255,255,255,0.7);
z-index:100;
}

.dark .topbar{
background:rgba(20,20,20,0.7);
}

.logo{
font-size:28px;
font-weight:bold;
}

.search-box{
width:40%;
}

.search-box input{
width:100%;
padding:12px 18px;
border:none;
border-radius:999px;
outline:none;
font-size:16px;
background:white;
}

.dark .search-box input{
background:#222;
color:white;
}

.gear{
font-size:28px;
cursor:pointer;
user-select:none;
}

.sidebar{
position:fixed;
top:0;
right:-320px;
width:320px;
height:100%;
background:white;
box-shadow:-10px 0 30px rgba(0,0,0,0.1);
padding:25px;
transition:0.3s;
overflow-y:auto;
z-index:200;
}

.dark .sidebar{
background:#1e242d;
}

.sidebar.open{
right:0;
}

.sidebar h2{
margin-top:0;
}

.sidebar button{
width:100%;
margin-bottom:12px;
padding:14px;
border:none;
border-radius:14px;
cursor:pointer;
font-size:15px;
background:#ececec;
}

.dark .sidebar button{
background:#2d3642;
color:white;
}

.workspace{
max-width:900px;
margin:auto;
padding:30px;
}

.block{
background:white;
border-radius:20px;
padding:20px;
margin-bottom:18px;
box-shadow:0 8px 25px rgba(0,0,0,0.05);
}

.dark .block{
background:#1e242d;
}

textarea{
width:100%;
min-height:120px;
border:none;
outline:none;
resize:vertical;
font-size:18px;
line-height:2;
background:transparent;
font-family:inherit;
color:inherit;
}

</style>
</head>

<body>

<h1>🐴 JegueFlow</h1>

<p>Arquivo gerado automaticamente.</p>

</body>
</html>
